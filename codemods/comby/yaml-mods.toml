[rename-yaml-variable]
# Renames a variable by matching its key and capturing everything up to the newline.
# `:[val\n]` specifically tells Comby to match until the end of the line.
match = '''
  OLD_REGION: :[val\n]
'''
rewrite = '''
  PRIMARY_REGION: :[val\n]
'''

[remove-yaml-variable]
# Matches a deprecated flag and its value, replacing it with nothing to delete it completely.
match = '''
  DEPRECATED_FLAG: :[val\n]
'''
rewrite = ''''''

[add-yaml-variable]
# You can hook onto a known block header (like `variables:` or `env:`) 
# to insert your new variable predictably at the top.
match = '''
variables:
'''
rewrite = '''
variables:
  NEW_METRIC_PORT: "8080"
'''

[add-pipeline-step]
# For CI/CD pipelines, you can match an existing step to insert a new one right after it.
# This ensures the new block goes into the array of `steps` at the right sequence.
match = '''
  - name: Checkout
    uses: actions/checkout@v3
'''
rewrite = '''
  - name: Checkout
    uses: actions/checkout@v3

  - name: Security Scan
    uses: security/scanner@v1
'''

[remove-pipeline-block]
# YAML doesn't have closing brackets, making it harder for structural parsers.
# To remove a block, you match the exact or approximate shape of the block 
# you want to remove and replace it with an empty string.
match = '''
  - name: Legacy Deploy
    script: ./deploy-legacy.sh
'''
rewrite = ''''''
