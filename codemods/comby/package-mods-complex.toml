#comby -config codemods/comby/package-mods-complex.toml -f package.json

[workspaces-array-to-object]
# Modifies the flat array into a complex nested object with `packages` and `nohoist` arrays
match = '''
  "workspaces": [
    :[workspaces]
  ],
'''
rewrite = '''
  "workspaces": {
    "packages": [
      :[workspaces]
    ],
    "nohoist": [
      "**/lodash*"
    ]
  },
'''

[swap-typecheck-and-lint]
# Comby is a structural pattern matcher, not a semantic JSON processor, so arbitrary alphabetical
# sorting on an unknown list of keys is out-of-scope. However, we can use structural matching
# to explicitly swap keys that we know are out of order.
match = '''
    "typecheck": ":[cmd1]",
    "lint": ":[cmd2]"
'''
rewrite = '''
    "lint": ":[cmd2]",
    "typecheck": ":[cmd1]"
'''

[add-nested-prettier]
# Adds a complex, deeply nested object immediately before the devDependencies block
match = '''
  "devDependencies": {
    :[deps]
  },
'''
rewrite = '''
  "prettier": {
    "semi": true,
    "singleQuote": true,
    "trailingComma": "all",
    "overrides": [
      {
        "files": "*.json",
        "options": {
          "tabWidth": 2
        }
      }
    ]
  },
  "devDependencies": {
    :[deps]
  },
'''

[remove-private-flag-and-add-publishConfig]
# JSON doesn't support comments natively, so "uncommenting" or managing experimental settings
# usually means matching the specific fields being locked down and swapping them out for
# the public variant.
match = '''
  "name": ":[name]",
  "private": true,
  "version": ":[version]",
'''
rewrite = '''
  "name": ":[name]",
  "version": ":[version]",
  "publishConfig": {
    "access": "public",
    "registry": "https://registry.npmjs.org/"
  },
'''
