---
type: specs.openrewrite.org/v1beta/recipe
name: com.yourorg.FictionalLoggerV2Migration
displayName: Fictional Logger V2 Migration
description: >
  Updates imports and function calls for the fictional-logger v2 update.

recipeList:
  - org.openrewrite.grit.GritQL:
      query: |
        engine marzano(0.1)
        language js

        import_specifier(name = "logging", alias = $alias) => import_specifier(name = "logV2", alias = $alias)