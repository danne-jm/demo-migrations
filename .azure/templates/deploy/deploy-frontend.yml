parameters:
  - name: vmImage
    type: string
  - name: artifactName
    type: string
  - name: environmentName
    type: string
  - name: webAppName
    type: string
  - name: ENVIRONMENT
    type: string
    default: ${{ variables.ENVIRONMENT }}
  - name: NODE_ENV
    type: string
    default: production

jobs:
  - deployment: DeployFrontend_${{ parameters.environmentName }}
    displayName: Deploy frontend to ${{ parameters.environmentName }}
    pool:
      vmImage: ${{ parameters.vmImage }}
    environment: ${{ parameters.environmentName }}
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: ${{ parameters.artifactName }}

            - task: AzureCLI@2
              displayName: Deploy frontend artifact
              inputs:
                azureSubscription: 'service-connection-demo'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  ARTIFACT_PATH="$(Pipeline.Workspace)/${{ parameters.artifactName }}/frontend.zip"
                  if [ ! -f "$ARTIFACT_PATH" ]; then
                    echo "frontend artifact not found at $ARTIFACT_PATH"
                    exit 1
                  fi

                  az webapp deployment source config-zip \
                    --resource-group rg-demo-${{ parameters.environmentName }} \
                    --name ${{ parameters.webAppName }} \
                    --src "$ARTIFACT_PATH"

            - task: AzureCLI@2
              displayName: Warm up frontend endpoint
              inputs:
                azureSubscription: 'service-connection-demo'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  URL="https://${{ parameters.webAppName }}.azurewebsites.net"
                  echo "Warming up $URL"
                  curl --fail --max-time 30 "$URL" >/dev/null
