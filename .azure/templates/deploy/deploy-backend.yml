parameters:
  - name: vmImage
    type: string
  - name: artifactName
    type: string
  - name: environmentName
    type: string
  - name: webAppName
    type: string
  - name: ENVIRONMENT
    type: string
    default: ${{ variables.ENVIRONMENT }}
  - name: NODE_ENV
    type: string
    default: production

jobs:
  - deployment: DeployBackend_${{ parameters.environmentName }}
    displayName: Deploy backend to ${{ parameters.environmentName }}
    pool:
      vmImage: ${{ parameters.vmImage }}
    environment: ${{ parameters.environmentName }}
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: ${{ parameters.artifactName }}

            - task: CopyFiles@2
              displayName: Stage backend artifact for deployment
              condition: succeeded()
              inputs:
                SourceFolder: '$(Pipeline.Workspace)/${{ parameters.artifactName }}'
                Contents: '**/*.zip'
                TargetFolder: '$(Build.ArtifactStagingDirectory)'

            - task: AzureCLI@2
              displayName: Deploy backend artifact
              inputs:
                azureSubscription: 'service-connection-demo'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  ARTIFACT_PATH="$(Pipeline.Workspace)/${{ parameters.artifactName }}/backend.zip"
                  if [ ! -f "$ARTIFACT_PATH" ]; then
                    echo "backend artifact not found at $ARTIFACT_PATH"
                    exit 1
                  fi

                  az webapp deployment source config-zip \
                    --resource-group rg-demo-${{ parameters.environmentName }} \
                    --name ${{ parameters.webAppName }} \
                    --src "$ARTIFACT_PATH"

            - task: AzureCLI@2
              displayName: Verify backend health endpoint
              inputs:
                azureSubscription: 'service-connection-demo'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  URL="https://${{ parameters.webAppName }}.azurewebsites.net/api/v1/health"
                  echo "Checking backend at $URL"
                  curl --fail --max-time 30 "$URL"
