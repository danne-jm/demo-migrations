trigger:
  branches:
    include:
      - main
      - develop
      - release/*
  paths:
    include:
      - frontend/*
      - backend/*
      - configs/*
      - .azure/*

pr:
  branches:
    include:
      - main
      - develop

name: $(Date:yyyyMMdd)$(Rev:.r)

variables:
  - name: ENVIRONMENT
    value: 'dev'
  - name: NODE_ENV
    value: 'production'
  - name: nodeVersion
    value: '20.x'
  - name: vmImage
    value: 'ubuntu-latest'
  - name: artifactNameFrontend
    value: 'frontend-dist'
  - name: artifactNameBackend
    value: 'backend-dist'
  - name: workingDirectory
    value: '$(Build.SourcesDirectory)'
  - name: frontendDirectory
    value: '$(Build.SourcesDirectory)/frontend'
  - name: backendDirectory
    value: '$(Build.SourcesDirectory)/backend'
  - name: environmentTemplate
    value: '${{ variables.ENVIRONMENT }}'
  - name: deployEnvironmentDev
    value: 'dev'
  - name: deployEnvironmentStage
    value: 'stage'
  - name: deployEnvironmentProd
    value: 'prod'

stages:
  - stage: Validate
    displayName: Validate and test
    jobs:
      - job: WorkspaceValidation
        displayName: Install and run type checks
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm

          - script: npm config set cache $(Pipeline.Workspace)/.npm --global
            displayName: Configure npm cache

          - script: |
              npm install
              npm build
            displayName: Install workspace dependencies
            workingDirectory: $(workingDirectory)

          - script: npm run typecheck
            displayName: Typecheck workspace
            workingDirectory: $(workingDirectory)

  - stage: Build
    displayName: Build frontend and backend
    dependsOn: Validate
    jobs:
      - template: ../templates/build/build-frontend.yml
        parameters:
          vmImage: $(vmImage)
          nodeVersion: $(nodeVersion)
          projectDirectory: $(frontendDirectory)
          artifactName: $(artifactNameFrontend)

      - template: ../templates/build/build-backend.yml
        parameters:
          vmImage: $(vmImage)
          nodeVersion: $(nodeVersion)
          projectDirectory: $(backendDirectory)
          artifactName: $(artifactNameBackend)

  - stage: Deploy_Dev
    displayName: Deploy to Development
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - template: ../templates/deploy/deploy-frontend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameFrontend)
          environmentName: $(deployEnvironmentDev)
          webAppName: 'demo-frontend-dev'

      - template: ../templates/deploy/deploy-backend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameBackend)
          environmentName: $(deployEnvironmentDev)
          webAppName: 'demo-backend-dev'

  - stage: Deploy_Stage
    displayName: Deploy to Staging
    dependsOn: Deploy_Dev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - template: ../templates/deploy/deploy-frontend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameFrontend)
          environmentName: $(deployEnvironmentStage)
          webAppName: 'demo-frontend-stage'

      - template: ../templates/deploy/deploy-backend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameBackend)
          environmentName: $(deployEnvironmentStage)
          webAppName: 'demo-backend-stage'

  - stage: Deploy_Prod
    displayName: Deploy to Production
    dependsOn: Deploy_Stage
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - template: ../templates/deploy/deploy-frontend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameFrontend)
          environmentName: $(deployEnvironmentProd)
          webAppName: 'demo-frontend-prod'

      - template: ../templates/deploy/deploy-backend.yml
        parameters:
          vmImage: $(vmImage)
          artifactName: $(artifactNameBackend)
          environmentName: $(deployEnvironmentProd)
          webAppName: 'demo-backend-prod'
